<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Webinar · Tribu Emprendedores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; overflow-x: hidden; }

:root {
  --purple:      #9747FF;
  --purple-dark: #7a2fe0;
  --black:       #0a0a0a;
  --gray-700:    #374151;
  --gray-500:    #6b7280;
  --gray-300:    #d1d5db;
  --gray-100:    #f3f4f6;
  --white:       #ffffff;
  --card-border: #e5e7eb;
  --radius:      16px;
  --radius-sm:   10px;
}

body {
  background: var(--white);
  color: var(--black);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--white);
  border-bottom: 1px solid var(--card-border);
  display: flex; align-items: center; justify-content: center;
  padding: 0 48px; height: 72px;
}
.nav-logo { display: flex; align-items: center; text-decoration: none; }
.nav-logo svg { height: 28px; width: auto; max-width: 160px; }

/* ── LAYOUT ── */
.page-max { max-width: 780px; margin: 0 auto; padding: 0 32px; }

/* ── HERO ── */
.hero {
  padding: 72px 0 56px;
  text-align: center;
  animation: fadeUp 0.45s ease both;
}

.label-tag {
  display: inline-block; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.13em; text-transform: uppercase;
  color: var(--purple); margin-bottom: 20px;
}

.hero h1 {
  font-size: clamp(2.2rem, 5vw, 3.4rem); font-weight: 800; line-height: 1.08;
  letter-spacing: -0.025em; color: var(--black);
  margin-bottom: 20px; white-space: pre-line;
}

.hero-sub {
  font-size: 1.05rem; color: var(--gray-500); line-height: 1.7;
  max-width: 560px; margin: 0 auto 36px;
}

/* ── META DEL EVENTO ── */
.event-meta {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
  margin-bottom: 44px;
}
.meta-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border: 1px solid var(--card-border);
  border-radius: 50px; font-size: 0.88rem; font-weight: 500; color: var(--gray-700);
  background: var(--gray-100);
}
.meta-pill svg { flex-shrink: 0; }

/* ── BULLETS ── */
.bullets {
  list-style: none;
  background: var(--gray-100); border-radius: var(--radius);
  padding: 28px 32px; margin-bottom: 44px; text-align: left;
}
.bullets li {
  display: flex; align-items: flex-start; gap: 12px;
  font-size: 0.97rem; color: var(--gray-700); line-height: 1.55;
  padding: 9px 0; border-bottom: 1px solid var(--card-border);
}
.bullets li:last-child { border-bottom: none; }
.bullet-dot {
  width: 22px; height: 22px; background: var(--purple);
  border-radius: 50%; flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
}
.bullet-dot svg { display: block; }

/* ── BOTÓN LUMA ── */
.luma-cta-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: 12px; margin-bottom: 32px;
}
.btn-registro {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 18px 48px;
  background: var(--purple); color: var(--white);
  font-family: 'DM Sans', sans-serif; font-weight: 800; font-size: 1.1rem;
  border-radius: 50px; text-decoration: none;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 6px 28px rgba(151,71,255,0.38);
  cursor: pointer; border: none;
  min-height: 56px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.btn-registro:hover {
  background: var(--purple-dark);
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(151,71,255,0.52);
}
.btn-arrow {
  width: 26px; height: 26px; background: var(--white); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.luma-note {
  font-size: 0.8rem; color: var(--gray-500); text-align: center;
}

/* ── FOOTER ── */
footer {
  background: var(--black); color: var(--white);
  padding: 40px 32px 28px; margin-top: 72px;
}
.footer-inner {
  max-width: 780px; margin: 0 auto;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.footer-logo-row svg { height: 22px; width: auto; }
.footer-tagline { font-size: 0.85rem; color: #9ca3af; text-align: center; }
.footer-bottom {
  width: 100%; padding-top: 18px;
  border-top: 1px solid #1f2937;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 6px;
}
.footer-copy, .footer-loc { font-size: 0.78rem; color: #6b7280; }

/* ── ANIMACIÓN ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(18px);} to { opacity:1; transform:translateY(0);} }

/* ── TABLET (≤ 768px) ── */
@media (max-width: 768px) {
  .hero { padding: 56px 0 48px; }
  .hero h1 { font-size: clamp(2rem, 5.5vw, 3rem); }
}

/* ── MÓVIL (≤ 600px) ── */
@media (max-width: 600px) {
  nav { padding: 0 16px; height: 60px; }
  .nav-logo svg { height: 22px; }
  .page-max { padding: 0 20px; }
  .hero { padding: 44px 0 48px; }
  .hero h1 { font-size: clamp(1.85rem, 8vw, 2.4rem); }
  .hero-sub { font-size: 0.95rem; margin-bottom: 28px; }

  /* Pills apiladas y a ancho completo */
  .event-meta { flex-direction: column; align-items: stretch; gap: 8px; margin-bottom: 32px; }
  .meta-pill { justify-content: flex-start; padding: 12px 16px; font-size: 0.86rem; border-radius: 12px; }

  .bullets { padding: 20px 18px; margin-bottom: 32px; }
  .bullets li { font-size: 0.92rem; padding: 10px 0; gap: 10px; }

  .btn-registro { width: 100%; justify-content: center; padding: 17px 24px; font-size: 1rem; }
  .luma-note { font-size: 0.78rem; }

  footer { padding: 32px 20px 24px; margin-top: 48px; }
  .footer-bottom { flex-direction: column; text-align: center; gap: 4px; }
}

/* ── MÓVIL PEQUEÑO (≤ 390px) ── */
@media (max-width: 390px) {
  .page-max { padding: 0 16px; }
  .hero h1 { font-size: clamp(1.7rem, 9vw, 2rem); }
  .label-tag { font-size: 0.65rem; }
  .meta-pill { padding: 10px 14px; font-size: 0.82rem; }
  .bullets { padding: 16px 14px; }
  .bullets li { font-size: 0.88rem; }
}

</style>

<!-- ── CONFIG + RENDER ── -->
<script src="config.js"></script>
<script>
(function () {
  const c = WEBINAR_CONFIG;

  document.title = c.titulo.replace(/\n/g, ' ') + ' · Tribu Emprendedores';
  document.getElementById('label-tag').textContent  = c.labelTag;
  document.getElementById('titulo').textContent     = c.titulo;
  document.getElementById('subtitulo').textContent  = c.subtitulo;
  document.getElementById('fecha').textContent      = c.fecha;
  document.getElementById('hora').textContent       = c.hora;
  document.getElementById('formato').textContent    = c.formato;
  document.getElementById('footer-tagline').textContent = c.footerTagline;
  document.getElementById('footer-copy').textContent    = c.footerCopy;
  document.getElementById('footer-loc').textContent     = c.footerLoc;

  const ul = document.getElementById('bullets-list');
  c.bullets.forEach(function (text) {
    const li = document.createElement('li');
    li.innerHTML =
      '<span class="bullet-dot">' +
        '<svg width="9" height="7" viewBox="0 0 9 7" fill="none">' +
          '<path d="M1 3.5l2.5 2.5L8 1" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>' +
      '</span>' +
      '<span>' + text + '</span>';
    ul.appendChild(li);
  });

  /* UTM passthrough al botón */
  const p = new URLSearchParams(window.location.search);
  const utmKeys = ['utm_source','utm_medium','utm_campaign','utm_content','campaign_id'];
  const btn = document.getElementById('cta-btn');
  utmKeys.forEach(function (k) {
    const v = p.get(k);
    if (!v || !btn) return;
    try {
      const u = new URL(btn.href);
      u.searchParams.set(k, v);
      btn.href = u.toString();
    } catch (e) {}
  });
})();
</script>
